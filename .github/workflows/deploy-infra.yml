name: deploy-infra

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/deploy-infra.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}

jobs:
  cdk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Materialise cdk.context.json
        env:
          REGION:    ${{ env.AWS_REGION }}
          CI_REPO:   ${{ github.repository }}
          SAGE_REPO: ${{ vars.SAGE_REPO || 'lazear/sage' }}
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          jq -n \
            --arg account "$ACCOUNT" \
            --arg region  "$REGION" \
            --arg ciRepo  "$CI_REPO" \
            --arg sageRepo "$SAGE_REPO" \
            '{ account:$account, region:$region, ciRepo:$ciRepo, sageRepo:$sageRepo }' \
            > cdk.context.json
          cat cdk.context.json

      - run: npm ci

      - run: npx cdk diff || true
      - run: npx cdk deploy --require-approval never --outputs-file ../cdk-outputs.json

      - name: Show stack outputs
        run: cat cdk-outputs.json
