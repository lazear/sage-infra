name: sage-infra dispatch

# Drop this file at .github/workflows/sage-infra-dispatch.yml in the upstream
# Sage repo. On every push to master it sends a repository_dispatch event
# to sage-infra, which then builds + benchmarks that commit on AWS.
#
# Required secret in the Sage repo:
#   SAGE_INFRA_DISPATCH_TOKEN  PAT (or GitHub App token) with `repo` scope on
#                           the sage-infra repository.
#
# Required repo variable (or hardcode below):
#   SAGE_INFRA_REPO            "<owner>/sage-infra" — defaults to lazear/sage-infra.

on:
  push:
    branches: [master]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send repository_dispatch
        env:
          GH_TOKEN: ${{ secrets.SAGE_INFRA_DISPATCH_TOKEN }}
          SAGE_INFRA_REPO: ${{ vars.SAGE_INFRA_REPO || 'lazear/sage-infra' }}
          SHA: ${{ github.sha }}
          MSG: ${{ github.event.head_commit.message }}
          AUTHOR: ${{ github.event.head_commit.author.name }}
          TS: ${{ github.event.head_commit.timestamp }}
        run: |
          set -euo pipefail
          # Trim message to first line to keep client_payload small/legible.
          MSG_FIRST=$(printf '%s' "$MSG" | head -1)
          gh api -X POST "/repos/${SAGE_INFRA_REPO}/dispatches" \
            --input - <<EOF
          {
            "event_type": "sage-master-push",
            "client_payload": {
              "sha": "${SHA}",
              "message": $(jq -Rsa . <<<"$MSG_FIRST"),
              "author": $(jq -Rsa . <<<"$AUTHOR"),
              "timestamp": "${TS}"
            }
          }
          EOF
          echo "dispatched ${SHA} -> ${SAGE_INFRA_REPO}"
